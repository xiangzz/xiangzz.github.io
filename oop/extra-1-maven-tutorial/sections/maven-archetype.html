<section id="maven-archetype" class="section-container">
    <h2>Maven Archetype</h2>
    <p>Maven Archetype是一个Maven插件，它可以根据现有的模板来快速创建一个项目结构，比如我们可以使用<code>maven-archetype-webapp</code>来快速创建一个Web项目的结构。</p>
    <p>我们可以在IDEA中通过Archetype来创建项目：</p>
    <div class="image-container">
        <img src="https://www.jetbrains.com/help/idea/img/new_project_wizard_maven_archetype.png" alt="Create Project from Archetype" class="content-image">
    </div>
    <p>我们可以选择合适的Archetype来创建项目，比如我们选择<code>maven-archetype-quickstart</code>来创建一个简单的Java项目。</p>
</section>
