<section id="maven-dependency-transitivity" class="section-container">
    <h2>Maven依赖传递</h2>
    <p>我们发现，在导入Mybatis依赖时，我们并没有导入它的核心依赖，但是我们依然可以使用，这是为什么呢？我们可以打开IDEA右侧的Maven窗口，来看看我们项目的依赖关系：</p>
        <div class="image-container">
        <img src="https://s2.loli.net/2023/03/06/gY3rK8t6jPqZzCb.jpg" alt="Maven Dependency Tree" class="content-image">
    </div>
    <p>我们发现，Mybatis依赖下面还关联了很多其他的依赖，这些依赖都是Mybatis的运行所需要的，我们不需要手动去进行导入，Maven会自动帮助我们导入这些依赖，这种特性我们成为依赖的传递性。</p>
    <p>依赖的传递性，指的是当A依赖B，B依赖C时，A会自动依赖C，这样就免去了我们手动去解决各种复杂的依赖关系了。</p>
</section>
