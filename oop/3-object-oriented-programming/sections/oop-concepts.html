<section id="oop-concepts" class="content-section">
    <h2>面向对象编程概念</h2>
    <p>面向对象编程（Object-Oriented
        Programming，OOP）是一种编程范式，它将现实世界中的事物抽象为对象，通过对象之间的交互来完成程序的功能。Java是一门纯面向对象的编程语言，除了基本数据类型，Java中的一切都是对象。</p>

    <p>面向对象编程有三大特性：</p>
    <ul>
        <li><strong>封装（Encapsulation）</strong>：将数据和操作数据的方法封装在一起，隐藏内部实现细节</li>
        <li><strong>继承（Inheritance）</strong>：子类可以继承父类的属性和方法，实现代码复用</li>
        <li><strong>多态（Polymorphism）</strong>：同一个接口可以有不同的实现方式</li>
    </ul>
</section>
